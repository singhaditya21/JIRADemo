name: Link ITSM problems to incidents

# One-click creation of REAL Jira Problem->Incident links (jira_config/link_problems.py),
# using the Jira token that already lives in this repo's Actions secrets — so nobody handles
# the token in a terminal. This MUTATES the Jira instance, so it only runs when you trigger
# it by hand (Actions tab -> this workflow -> "Run workflow"), and it defaults to a DRY RUN:
# the first click rehearses and creates nothing. To actually create links, set "dry_run" to
# false. Idempotent — re-running never duplicates a link. After a real run, the next Pages
# bake surfaces the links in the Problem-management panel's incident footprint.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Rehearse only — create no links (uncheck to write to Jira)"
        type: boolean
        default: true
      per_problem:
        description: "Base links per problem (each problem gets this..this+4)"
        default: "4"

permissions:
  contents: read

jobs:
  link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Create Problem→Incident links
        env:
          JIRA_SITE: ${{ secrets.JIRA_SITE }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        # FAIL-SAFE decision made in BASH, not a GitHub `${{ }}` ternary. GitHub's expression
        # `==` coerces booleans and strings to numbers, so `inputs.dry_run == false` can be
        # false even for a false input — which silently defaulted a real run back to a dry run.
        # String INTERPOLATION is deterministic though: `${{ inputs.dry_run }}` renders as the
        # literal "true"/"false", so we branch on that. --dry-run stays on unless the input is
        # an explicit falsey string, so a misread never writes to Jira by accident.
        run: |
          echo "dry_run input rendered as: '${{ inputs.dry_run }}'"
          FLAG="--dry-run"
          case "${{ inputs.dry_run }}" in
            false|False|FALSE|no|No|0|off) FLAG="" ;;
          esac
          echo "linker mode: ${FLAG:-APPLY (writing real links)}"
          python3 -m jira_config.link_problems $FLAG --per-problem "${{ inputs.per_problem }}"
