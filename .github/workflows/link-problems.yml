name: Link ITSM problems to incidents

# One-click creation of REAL Jira Problem->Incident links (jira_config/link_problems.py),
# using the Jira token that already lives in this repo's Actions secrets â€” so nobody handles
# the token in a terminal. This MUTATES the Jira instance, so it only runs when you trigger
# it by hand (Actions tab -> this workflow -> "Run workflow"), and it defaults to a DRY RUN:
# the first click rehearses and creates nothing. To actually create links, set "dry_run" to
# false. Idempotent â€” re-running never duplicates a link. After a real run, the next Pages
# bake surfaces the links in the Problem-management panel's incident footprint.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "inspect (read-only dump) Â· link (create) Â· repair (fix direction)"
        type: choice
        options: [inspect, link, repair]
        default: inspect
      dry_run:
        description: "Rehearse only â€” write nothing (uncheck to actually write to Jira)"
        type: boolean
        default: true
      per_problem:
        description: "Base links per problem (each problem gets this..this+4)"
        default: "4"

permissions:
  contents: read

jobs:
  link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run the Problemâ†’Incident linker
        # SECURITY: every workflow input is passed through `env:` and referenced as a shell
        # variable ("$DRY_RUN", "$PER_PROBLEM", "$MODE") â€” NEVER interpolated as ${{ ... }} into
        # the script body, which would let an input value inject shell commands into a step that
        # holds JIRA_TOKEN. per_problem is validated as an integer before use.
        #
        # FAIL-SAFE gate: --dry-run stays on unless dry_run is an explicit falsey string. The
        # decision is a bash `case` on the interpolated string (deterministic), not a GitHub
        # `${{ == }}` ternary (whose type coercion once defaulted a real run back to dry-run).
        env:
          JIRA_SITE: ${{ secrets.JIRA_SITE }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          MODE: ${{ inputs.mode }}
          DRY_RUN: ${{ inputs.dry_run }}
          PER_PROBLEM: ${{ inputs.per_problem }}
        run: |
          set -euo pipefail
          case "$PER_PROBLEM" in
            ''|*[!0-9]*) echo "per_problem must be a positive integer, got '$PER_PROBLEM'"; exit 1 ;;
          esac
          FLAG="--dry-run"
          case "$DRY_RUN" in
            false|False|FALSE|no|No|0|off) FLAG="" ;;
          esac
          echo "mode=$MODE  dry_run='$DRY_RUN'  per_problem=$PER_PROBLEM"
          case "$MODE" in
            inspect)
              echo "MODE: inspect (read-only, no writes)"
              python3 -m jira_config.link_problems --inspect ;;
            repair)
              echo "MODE: repair  gate: ${FLAG:-APPLY (writing to Jira)}"
              python3 -m jira_config.link_problems --repair $FLAG --per-problem "$PER_PROBLEM" ;;
            *)
              echo "MODE: link  gate: ${FLAG:-APPLY (writing real links)}"
              python3 -m jira_config.link_problems $FLAG --per-problem "$PER_PROBLEM" ;;
          esac
