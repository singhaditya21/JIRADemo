name: SF Config — deploy/health writeback (modelled)

# The DeliveryIQ writeback (app/sfc_writeback.py). There is NO live Salesforce — DeliveryIQ
# tracks Salesforce config requests as Jira issues — so per-org deploy state + config health
# are MODELLED. This job maintains them: it models each org's deploy state + config health
# and WRITES them onto the SFC "Org Deploy" sub-tasks (Deploy State, Config Health, a fresh
# Health Checked At, Deploy Source = "Modelled"). The writeback to Jira and the timestamp are
# real, so the health board's freshness/staleness signal is genuine; the values are
# illustrative and labelled "Modelled" per cell — never dressed up as a live read.
#
# It MUTATES Jira, so it only runs when you trigger it by hand and DEFAULTS TO A DRY RUN.
# Uncheck dry_run to actually write. The token stays a CI secret.
#
# If a real Salesforce org is ever connected, replace deploy_health_model() with the
# Tooling/Metadata API calls and write Source = "CI writeback" so the board can tell observed
# data from the model — no other change.
#
# Not scheduled by default: a job that silently mutates Jira on a timer is a standing side
# effect. Add a `schedule:` cron here if you want the model refreshed periodically.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Rehearse only — write nothing (uncheck to actually write to Jira)"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  writeback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Model + write deploy state / config health onto the Jira sub-tasks
        # SECURITY: the input passes through env and is read as a shell var, never
        # ${{ }}-interpolated into the token-bearing step. The dry gate is a bash `case`
        # on the string (not a GH ${{ == }} ternary).
        env:
          JIRA_SITE: ${{ secrets.JIRA_SITE }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          FLAG="--dry-run"
          case "$DRY_RUN" in
            false|False|FALSE|no|No|0|off) FLAG="" ;;
          esac
          echo "dry_run='$DRY_RUN'  gate=${FLAG:-APPLY (writing to Jira)}"
          python3 -m app.sfc_writeback $FLAG
