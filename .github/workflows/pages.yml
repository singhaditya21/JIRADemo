name: Deploy control tower to GitHub Pages

# Builds the React control tower (webapp/) and deploys it to GitHub Pages, with the Jira
# data baked in at build time by app/export_pages.py. The Jira token lives ONLY here, as a
# repo secret — it never reaches the browser, and the browser never calls Jira (a public
# static page could not do either securely). So the site is "aligned with Jira, refreshed on
# schedule": current to within the cron interval below.
#
# One-time setup (see webapp/DEPLOY-PAGES.md):
#   1. Repo must be able to publish Pages: PUBLIC repo (free, recommended for this demo), or
#      a private repo on GitHub Pro. NOTE the published site is world-readable either way.
#   2. Settings -> Pages -> Source: GitHub Actions.
#   3. Add repo secrets JIRA_SITE, JIRA_EMAIL, JIRA_TOKEN (Settings -> Secrets and variables
#      -> Actions). Set them yourself so the token is never handled in chat or committed.

on:
  push:
    branches: [main]
  schedule:
    # Every 30 minutes — the roadmap's "near-real-time (15–30 min)" bar, achieved on a static
    # host by baking often rather than running a live backend. The repo is public so Actions
    # minutes are unlimited; 2 builds/hour stays well under GitHub Pages' rate limit. GitHub may
    # delay scheduled runs under load. The app also re-polls every 5 min, so a left-open tab
    # picks up each redeploy. (Snapshot history is date-keyed, so this still appends one point
    # per day, not one per bake.)
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # the build job commits the appended snapshot-history back to main
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bake Jira data to static JSON
        env:
          JIRA_SITE: ${{ secrets.JIRA_SITE }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: python3 -m app.export_pages   # stdlib only, no pip install needed

      - name: Alert on off-target KPIs
        # Reads the just-baked scoreboard (no Jira call, no secret) and writes every KPI
        # breaching target to this run's job summary — the tower flags itself off-target
        # from CI, so a scheduled run surfaces it without anyone opening the dashboard.
        # Warn-only: a GAP is the expected story on this demo, so it never reds the build.
        # Add --fail-on-breach for a real deployment that wants a red build when off-target.
        run: python3 -m app.alerts --data-dir webapp/public/data --days 90

      - name: SF Config lens — preview seed only as a fallback
        # P0 has landed: app/export_pages now bakes the REAL SFC project (app/sfc_export),
        # writing SFC-*.json with preview:false. This step is now a FALLBACK: it writes the
        # deterministic preview seed ONLY if the live bake produced nothing (e.g. the SFC
        # project is unreachable), so the lens is never blank. When the live bake succeeds,
        # SFC-records.json already exists and this is a no-op.
        run: |
          if [ -f webapp/public/data/SFC-records.json ]; then
            echo "live SFC bake present — skipping the preview seed"
          else
            echo "no live SFC bake — writing the deterministic preview seed"
            python3 -m app.sfc_seed --n 64
          fi

      - name: Persist snapshot history + frozen baselines
        # The bake appended today's KPI point to *-history.json and (first-run-only) froze
        # *-baseline.json. Commit both back so they accumulate/persist run-over-run. History is
        # date-keyed + no run timestamp, so a same-day re-run is a no-op diff; a baseline is
        # write-once (the exporter skips it once the file exists), so this commits it exactly
        # once — that is what makes SFC's baseline actually frozen rather than re-frozen every
        # bake. [skip ci] + GITHUB_TOKEN pushes don't re-trigger the workflow, so there is no loop.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add webapp/public/data/*-history.json webapp/public/data/*-baseline.json
          if git diff --cached --quiet; then
            echo "snapshot history + baselines unchanged — nothing to commit"
          else
            git commit -m "Snapshot history + baselines $(date -u +%F) [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build the React app
        working-directory: webapp
        # NEAR-REAL-TIME SWITCH — no YAML edit needed. Set a repo Variable named
        # VITE_API_BASE (Settings → Secrets and variables → Actions → Variables) to your
        # deployed backend URL and the build flips to live "api" mode automatically; leave it
        # unset and the build stays static (the safe default). See webapp/DEPLOY-BACKEND.md.
        env:
          VITE_BASE: /JIRADemo/
          VITE_DATA_MODE: ${{ vars.VITE_API_BASE != '' && 'api' || 'static' }}
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: |
          echo "build mode: ${VITE_DATA_MODE}${VITE_API_BASE:+ -> $VITE_API_BASE}"
          bun install --frozen-lockfile   # uses the committed webapp/bun.lock (reproducible)
          bun run build

      - uses: actions/configure-pages@v5
        with:
          enablement: true   # self-enable Pages on first run so no manual toggle is needed

      - uses: actions/upload-pages-artifact@v3
        with:
          path: webapp/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
